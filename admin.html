 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | UpnetAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        body { background-color: #fdfbf7; font-family: 'Outfit', sans-serif; }
        .glass { background: white; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 24px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-gray-900"><i class="fa-solid fa-lock text-[#d4af37] mr-2"></i>Admin <span class="text-[#d4af37]">Control</span></h1>
                <p class="text-gray-500 text-sm font-bold">Add New Products to Marketplace</p>
            </div>
            <a href="index.html" class="text-xs font-bold bg-gray-100 px-4 py-2 rounded-full hover:bg-gray-200 transition-all">View Website</a>
        </header>

        <div id="admin-gate" class="glass p-10 text-center">
            <i class="fa-solid fa-user-shield text-5xl text-gray-200 mb-4"></i>
            <h2 class="text-xl font-bold mb-6">Verifying Admin Access...</h2>
        </div>

        <div id="admin-form-container" class="hidden">
            <div class="glass p-8">
                <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Product Name</label>
                        <input type="text" id="p-name" required class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#d4af37] outline-none" placeholder="e.g. Master Tech Business Bundle">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Price (USD)</label>
                        <input type="number" id="p-price" step="0.01" required class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#d4af37] outline-none" placeholder="9.99">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Category</label>
                        <select id="p-category" class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#d4af37] outline-none">
                            <option>Templates</option>
                            <option>Source Codes</option>
                            <option>E-Books</option>
                            <option>AI Tools</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Description</label>
                        <textarea id="p-desc" required class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#d4af37] outline-none h-24" placeholder="Brief details about the product..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Image URL (Unsplash or Drive)</label>
                        <input type="text" id="p-img" required class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#d4af37] outline-none" placeholder="https://images.unsplash.com/...">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Download Link (Google Drive)</label>
                        <input type="text" id="p-link" required class="w-full p-3 rounded-xl border border-gray-200 focus:border-[#d4af37] outline-none" placeholder="https://drive.google.com/...">
                    </div>
                    <div class="md:col-span-2 mt-4">
                        <button type="submit" id="add-btn" class="w-full bg-dark text-white font-black py-4 rounded-2xl hover:bg-[#d4af37] transition-all shadow-xl shadow-gold/10">
                            PUBLISH TO MARKETPLACE
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5CZZGOr37cwjbNOFAwEK0XdVg-_P0vUw",
            authDomain: "upnetai-pletform.firebaseapp.com",
            projectId: "upnetai-pletform",
            storageBucket: "upnetai-pletform.firebasestorage.app",
            messagingSenderId: "538671520760",
            appId: "1:538671520760:web:24e4ad5647877565c6140d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Security Check: Sirf AAP (Vinay) hi access kar sakein
        const ADMIN_EMAIL = "vinay724063@gmail.com"; // Yahan apni asli email daalein

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById("admin-gate").classList.add("hidden");
                document.getElementById("admin-form-container").classList.remove("hidden");
                Toastify({ text: "Welcome, Vinay! Admin Access Granted.", style: { background: "#d4af37" } }).showToast();
            } else {
                document.getElementById("admin-gate").innerHTML = `<h2 class="text-red-500 font-bold text-xl">Access Denied!</h2><p class="text-gray-500 mt-2">Only Vinay can access this page.</p><a href="login.html" class="mt-4 inline-block text-gold font-bold">Login as Admin</a>`;
            }
        });

        // Add Product to Firestore
        const form = document.getElementById("product-form");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("add-btn");
            btn.innerText = "Publishing...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "products"), {
                    name: document.getElementById("p-name").value,
                    price: parseFloat(document.getElementById("p-price").value),
                    category: document.getElementById("p-category").value,
                    description: document.getElementById("p-desc").value,
                    image: document.getElementById("p-img").value,
                    link: document.getElementById("p-link").value,
                    createdAt: serverTimestamp()
                });

                Toastify({ text: "✔️ Success! Product added to Marketplace", style: { background: "linear-gradient(to right, #00b09b, #96c93d)" } }).showToast();
                form.reset();
            } catch (error) {
                alert("Error adding product: " + error.message);
            } finally {
                btn.innerText = "PUBLISH TO MARKETPLACE";
                btn.disabled = false;
            }
        });
    </script>
</body>
  </html>
