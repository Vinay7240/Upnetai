<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | UpnetAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #fdfbf7; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-[#d4af37] rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-[#1a1a1a] rounded-full mix-blend-multiply filter blur-[100px] opacity-10"></div>

    <div class="glass max-w-md w-full rounded-3xl p-8 relative z-10">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block text-3xl font-extrabold text-gray-900 mb-2">
                <i class="fa-solid fa-crown text-[#d4af37] mr-2"></i>UpnetAI
            </a>
            <p class="text-gray-500 font-medium" id="form-subtitle">Welcome back! Please enter your details.</p>
        </div>

        <form id="auth-form" class="space-y-5">
            <div id="name-field" class="hidden">
                <label class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#d4af37] focus:ring-2 focus:ring-[#d4af37]/20 outline-none transition-all" placeholder="Enter your name">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#d4af37] focus:ring-2 focus:ring-[#d4af37]/20 outline-none transition-all" placeholder="you@email.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#d4af37] focus:ring-2 focus:ring-[#d4af37]/20 outline-none transition-all" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-[#1a1a1a] text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition-all shadow-lg mt-2">
                Sign In
            </button>
        </form>

        <div class="mt-6 flex items-center justify-between">
            <span class="border-b border-gray-200 w-1/5"></span>
            <span class="text-xs text-gray-500 font-bold uppercase">Or continue with</span>
            <span class="border-b border-gray-200 w-1/5"></span>
        </div>

        <button id="google-btn" class="w-full mt-6 bg-white border border-gray-200 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-50 transition-all flex items-center justify-center shadow-sm">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 mr-3" alt="Google">
            Sign in with Google
        </button>

        <p class="text-center mt-8 text-sm text-gray-600 font-medium">
            <span id="toggle-text">Don't have an account?</span> 
            <button id="toggle-mode" class="text-[#d4af37] font-bold hover:underline ml-1">Sign Up</button>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5CZZGOr37cwjbNOFAwEK0XdVg-_P0vUw",
            authDomain: "upnetai-pletform.firebaseapp.com",
            projectId: "upnetai-pletform",
            storageBucket: "upnetai-pletform.firebasestorage.app",
            messagingSenderId: "538671520760",
            appId: "1:538671520760:web:24e4ad5647877565c6140d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let isLogin = true;
        const form = document.getElementById('auth-form');
        const nameField = document.getElementById('name-field');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMode = document.getElementById('toggle-mode');
        const toggleText = document.getElementById('toggle-text');
        const subtitle = document.getElementById('form-subtitle');

        // Login / Signup Form Switcher Logic
        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            if(isLogin) {
                nameField.classList.add('hidden');
                document.getElementById('name').removeAttribute('required');
                submitBtn.innerText = 'Sign In';
                toggleText.innerText = "Don't have an account?";
                toggleMode.innerText = "Sign Up";
                subtitle.innerText = "Welcome back! Please enter your details.";
            } else {
                nameField.classList.remove('hidden');
                document.getElementById('name').setAttribute('required', 'true');
                submitBtn.innerText = 'Create Account';
                toggleText.innerText = "Already have an account?";
                toggleMode.innerText = "Sign In";
                subtitle.innerText = "Join UpnetAI. Create your premium account today.";
            }
        });

        // Form Submit Logic (Email/Password)
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            submitBtn.innerText = "Please wait...";

            if(!isLogin) {
                // Naya Account Banane ka Logic
                const name = document.getElementById('name').value;
                createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    updateProfile(userCredential.user, { displayName: name }).then(() => {
                        window.location.href = "dashboard.html";
                    });
                }).catch((error) => {
                    alert("Error: " + error.message);
                    submitBtn.innerText = "Create Account";
                });
            } else {
                // Purane Account me Login ka Logic
                signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "dashboard.html";
                }).catch((error) => {
                    alert("Incorrect Email or Password!");
                    submitBtn.innerText = "Sign In";
                });
            }
        });

        // Google Login Logic
        document.getElementById('google-btn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then(() => {
                window.location.href = "dashboard.html";
            }).catch((error) => {
                alert("Google Login Error: " + error.message);
            });
        });
    </script>
</body>
</html>
